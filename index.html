<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#000000" />
  <title>Splits — Expense Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="icon" type="image/png" href="icon.png">
  <style>
    :root {
      --bg:      #000000;
      --surface: #0d0d0d;
      --surface2:#141414;
      --rim:     #222222;
      --rim2:    #2e2e2e;
      --muted:   #444444;
      --text:    #f0f0f0;
      --sub:     #888888;
      --add:     #3ddc84;
      --red:     #ff5f5f;
      --accent:  #7c6af7;
      --gold:    #f5a623;
      --r:       16px;
      --r-sm:    10px;
      --mono:    'DM Mono', monospace;
      --sans:    'DM Sans', sans-serif;
      --top-nav-h: 56px;
      --bot-nav-h: 64px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }

    /* ── SCREENS ── */
    .screen {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      transition: opacity .25s, transform .25s;
    }
    .screen.hidden { opacity: 0; pointer-events: none; transform: translateY(14px); }

    /* ── LOGIN ── */
    #loginScreen { gap: 48px; padding: 36px; background: #000; }
    .login-logo { text-align: center; }
    .login-logo .logo-mark {
      font-family: var(--mono); font-size: 56px;
      letter-spacing: -3px; color: var(--text);
    }
    .login-logo h1 {
      font-size: 12px; font-weight: 400; letter-spacing: 6px;
      text-transform: uppercase; color: var(--muted); margin-top: 10px;
    }
    .name-input-wrap { width: 100%; max-width: 300px; display: flex; flex-direction: column; gap: 14px; }
    .name-input-wrap label { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
    .name-input-wrap input {
      background: var(--surface); border: 1px solid var(--rim2);
      border-radius: var(--r); color: var(--text); font-family: var(--sans);
      font-size: 20px; font-weight: 500; padding: 18px 20px;
      outline: none; width: 100%; transition: border-color .2s;
    }
    .name-input-wrap input:focus { border-color: var(--sub); }
    .name-input-wrap input::placeholder { color: var(--muted); }
    .btn-primary {
      background: var(--text); border: none; border-radius: var(--r);
      color: #000; cursor: pointer; font-family: var(--sans);
      font-size: 15px; font-weight: 700; letter-spacing: .5px;
      padding: 18px; width: 100%; transition: opacity .15s, transform .1s;
    }
    .btn-primary:active { opacity: .8; transform: scale(.98); }
    .login-hint { font-size: 12px; color: var(--muted); text-align: center; line-height: 1.7; }

    /* ── TOP NAV ── */
    .top-nav {
      position: fixed; top: 0; left: 0; right: 0;
      height: var(--top-nav-h);
      background: var(--bg);
      border-bottom: 1px solid var(--rim);
      display: flex; align-items: center;
      padding: 0 8px;
      padding-top: env(safe-area-inset-top, 0px);
      z-index: 50;
      gap: 2px;
    }
    .top-nav-item {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 2px; cursor: pointer;
      padding: 8px 6px; border-radius: 10px;
      background: none; border: none; color: var(--muted);
      font-family: var(--sans); transition: color .15s, background .15s;
      position: relative;
    }
    .top-nav-item.active { color: var(--text); }
    .top-nav-item.active::after {
      content: ''; position: absolute; bottom: 2px; left: 50%;
      transform: translateX(-50%);
      width: 20px; height: 2px; border-radius: 1px;
      background: var(--accent);
    }
    .top-nav-icon { font-size: 18px; line-height: 1; }
    .top-nav-label { font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; }
    .top-nav-add {
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--text); border: none; cursor: pointer;
      color: #000; font-size: 24px; font-weight: 300; line-height: 1;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin: 0 4px;
      box-shadow: 0 0 0 1px var(--rim2), 0 4px 16px rgba(0,0,0,.5);
      transition: transform .15s, box-shadow .15s;
    }
    .top-nav-add:active { transform: scale(.9); }

    /* ── HOME ── */
    #homeScreen { justify-content: flex-start; padding: 0; overflow: hidden; }

    .home-content {
      display: flex; flex-direction: column; width: 100%;
      flex: 1; overflow: hidden;
      padding-top: var(--top-nav-h);
      padding-bottom: var(--bot-nav-h);
    }

    .home-header {
      width: 100%; padding: 14px 22px 10px;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .header-left { display: flex; flex-direction: column; gap: 1px; }
    .greeting { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
    .username-display { font-size: 22px; font-weight: 600; color: var(--text); }
    .icon-btn {
      background: var(--surface); border: 1px solid var(--rim2); border-radius: 50%;
      color: var(--sub); cursor: pointer; width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center; font-size: 16px;
      transition: background .15s;
    }
    .icon-btn:active { background: var(--rim2); }

    /* ── MONTH CARD ── */
    .month-card {
      width: calc(100% - 44px); margin: 0 22px; flex-shrink: 0;
      background: var(--surface);
      border: 1px solid var(--rim2); border-radius: 20px;
      padding: 22px 22px 18px; position: relative; overflow: hidden;
    }
    .month-card::after {
      content: ''; position: absolute; top: 0; right: 0; bottom: 0;
      width: 3px; border-radius: 0 20px 20px 0;
      background: linear-gradient(180deg, var(--accent) 0%, transparent 100%);
    }
    .month-label { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
    .month-total { font-family: var(--mono); font-size: 46px; font-weight: 400; line-height: 1; letter-spacing: -2px; color: var(--text); }
    .month-total .currency { font-size: 18px; color: var(--muted); margin-right: 3px; vertical-align: super; }
    .month-divider { height: 1px; background: var(--rim); margin: 16px 0; }
    .member-totals { display: flex; }
    .member-total { flex: 1; display: flex; flex-direction: column; gap: 4px; }
    .member-total + .member-total { border-left: 1px solid var(--rim); padding-left: 16px; margin-left: 16px; }
    .member-name { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); display: flex; align-items: center; gap: 5px; }
    .member-amount { font-family: var(--mono); font-size: 22px; font-weight: 400; color: var(--text); }
    .dot { display: inline-block; width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
    .dot-me   { background: var(--accent); }
    .dot-them { background: var(--gold); }

    /* ── SWIPE ZONE ── */
    .swipe-zone {
      flex-shrink: 0; width: 100%; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      touch-action: pan-y; user-select: none; position: relative;
      gap: 0; padding: 8px 0;
    }
    .swipe-hint-up, .swipe-hint-down {
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      opacity: .4; transition: opacity .2s;
    }
    .swipe-zone.dragging-up .swipe-hint-up { opacity: 1; }
    .swipe-zone.dragging-down .swipe-hint-down { opacity: 1; }
    .hint-arrow { font-size: 18px; color: var(--sub); }
    .swipe-hint-up .hint-arrow { color: var(--add); animation: bob-up 2.2s ease-in-out infinite; }
    .swipe-hint-down .hint-arrow { color: var(--red); animation: bob-down 2.2s ease-in-out infinite .4s; }
    @keyframes bob-up   { 0%,100%{transform:translateY(2px)} 50%{transform:translateY(-4px)} }
    @keyframes bob-down { 0%,100%{transform:translateY(-2px)} 50%{transform:translateY(4px)} }
    .hint-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
    .swipe-center { display: flex; flex-direction: column; align-items: center; gap: 8px; margin: 16px 0; }
    .swipe-ring {
      width: 76px; height: 76px; border-radius: 50%;
      border: 1px solid var(--rim2);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--mono); font-size: 26px; color: var(--muted);
      background: var(--surface);
      transition: all .18s;
    }
    .swipe-zone.dragging-up   .swipe-ring { border-color: var(--add); color: var(--add); background: rgba(61,220,132,.08); transform: scale(1.1); }
    .swipe-zone.dragging-down .swipe-ring { border-color: var(--red); color: var(--red); background: rgba(255,95,95,.08);  transform: scale(1.1); }
    .swipe-sub { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }

    /* ── ENTRIES LIST ── */
    .entries-scroll {
      flex: 1; width: 100%; overflow-y: auto;
      -webkit-overflow-scrolling: touch; scrollbar-width: none;
      padding: 10px 22px 10px; display: flex; flex-direction: column; gap: 7px;
    }
    .entries-scroll::-webkit-scrollbar { display: none; }
    .home-entry {
      background: var(--surface); border: 1px solid var(--rim);
      border-radius: var(--r-sm); padding: 12px 14px;
      display: flex; justify-content: space-between; align-items: center;
      animation: fadein .18s ease;
    }
    @keyframes fadein { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:none} }
    .he-left { display: flex; flex-direction: column; gap: 3px; }
    .he-who  { font-size: 11px; color: var(--sub); display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
    .he-desc { font-size: 13px; color: var(--text); }
    .he-meta { font-size: 10px; color: var(--muted); }
    .he-amt  { font-family: var(--mono); font-size: 16px; font-weight: 400; }
    .he-amt.pos { color: var(--add); }
    .he-amt.neg { color: var(--red); }
    .cat-pill {
      font-size: 9px; padding: 2px 7px; border-radius: 99px;
      border: 1px solid var(--rim2); color: var(--muted); letter-spacing: .5px;
    }
    .empty-home { text-align: center; padding: 30px 0; color: var(--muted); font-size: 13px; line-height: 2; }

    /* ── LIVE BAR ── */
    .live-bar {
      width: 100%; padding: 5px 22px; flex-shrink: 0;
      display: flex; align-items: center; gap: 6px;
      font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted);
      border-top: 1px solid var(--rim);
    }
    .live-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--add); animation: blink 2s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

    /* ── BOTTOM NAV ── */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: var(--bot-nav-h);
      background: var(--surface); border-top: 1px solid var(--rim);
      display: flex; align-items: center; justify-content: space-around;
      padding: 0 24px;
      padding-bottom: env(safe-area-inset-bottom, 0px);
      z-index: 50;
    }
    .nav-item {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; gap: 4px; cursor: pointer;
      padding: 8px; border-radius: 12px;
      background: none; border: none; color: var(--muted);
      font-family: var(--sans); transition: color .15s;
    }
    .nav-item.active { color: var(--text); }
    .nav-icon { font-size: 22px; line-height: 1; }
    .nav-label { font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.85); backdrop-filter: blur(10px);
      z-index: 100; display: flex; align-items: flex-end;
      transition: opacity .22s;
    }
    .modal-overlay.hidden { opacity: 0; pointer-events: none; }
    .modal-sheet {
      background: var(--surface); border-radius: 22px 22px 0 0;
      border-top: 1px solid var(--rim2);
      padding: 10px 22px 44px; width: 100%;
      transition: transform .28s cubic-bezier(.4,0,.2,1);
    }
    .modal-overlay.hidden .modal-sheet { transform: translateY(100%); }
    .modal-handle { width: 36px; height: 4px; background: var(--rim2); border-radius: 2px; margin: 0 auto 22px; }
    .modal-title { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    .mode-badge { font-size: 10px; padding: 3px 10px; border-radius: 99px; font-weight: 600; }
    .mode-badge.add { background: rgba(61,220,132,.12); color: var(--add); }
    .mode-badge.sub { background: rgba(255,95,95,.12);  color: var(--red); }

    .modal-cats { display: flex; gap: 7px; overflow-x: auto; margin-bottom: 16px; scrollbar-width: none; }
    .modal-cats::-webkit-scrollbar { display: none; }
    .modal-cat-btn {
      flex-shrink: 0; background: none; border: 1px solid var(--rim2);
      border-radius: 99px; color: var(--muted); cursor: pointer;
      font-family: var(--sans); font-size: 12px; padding: 6px 14px;
      transition: all .15s;
    }
    .modal-cat-btn.selected { border-color: var(--text); color: var(--text); background: rgba(255,255,255,.06); }

    .amount-row {
      display: flex; align-items: center; gap: 6px;
      border-bottom: 1px solid var(--rim2); padding-bottom: 10px; margin-bottom: 14px;
      transition: border-color .2s;
    }
    .amount-row:focus-within { border-color: var(--sub); }
    .amount-symbol { font-family: var(--mono); font-size: 28px; color: var(--muted); }
    #amountInput {
      background: none; border: none; outline: none;
      font-family: var(--mono); font-size: 52px; font-weight: 400;
      color: var(--text); width: 100%; -moz-appearance: textfield;
    }
    #amountInput::-webkit-inner-spin-button,
    #amountInput::-webkit-outer-spin-button { -webkit-appearance: none; }

    #descInput {
      background: var(--surface2); border: 1px solid var(--rim);
      border-radius: 12px; color: var(--text); font-family: var(--sans);
      font-size: 15px; padding: 12px 14px; width: 100%; outline: none;
      margin-bottom: 14px; transition: border-color .2s;
    }
    #descInput:focus { border-color: var(--sub); }
    #descInput::placeholder { color: var(--muted); }

    .modal-date { font-size: 11px; color: var(--muted); margin-bottom: 18px; letter-spacing: .5px; }
    .modal-actions { display: flex; gap: 10px; }
    .btn-cancel {
      flex: 1; background: none; border: 1px solid var(--rim2);
      border-radius: var(--r); color: var(--sub); cursor: pointer;
      font-family: var(--sans); font-size: 15px; font-weight: 500; padding: 15px;
      transition: background .15s;
    }
    .btn-cancel:active { background: var(--rim); }
    .btn-confirm {
      flex: 2; border: none; border-radius: var(--r); cursor: pointer;
      font-family: var(--sans); font-size: 15px; font-weight: 700; padding: 15px;
      transition: opacity .15s, transform .1s;
    }
    .btn-confirm.add { background: var(--add); color: #000; }
    .btn-confirm.sub { background: var(--red); color: #fff; }
    .btn-confirm:active { opacity: .85; transform: scale(.98); }

    /* ── ADD CAT MODAL ── */
    #addCatModal .modal-sheet { padding-bottom: 44px; }
    .cat-modal-inputs { display: flex; gap: 10px; margin-bottom: 20px; }
    #catEmojiInput {
      background: var(--surface2); border: 1px solid var(--rim2); border-radius: 12px;
      color: var(--text); font-size: 26px; padding: 10px; width: 56px;
      outline: none; text-align: center;
    }
    #catNameInput {
      background: var(--surface2); border: 1px solid var(--rim2); border-radius: 12px;
      color: var(--text); font-family: var(--sans); font-size: 16px;
      padding: 12px 14px; flex: 1; outline: none;
    }
    #catNameInput:focus, #catEmojiInput:focus { border-color: var(--sub); }

    /* ── HISTORY SCREEN ── */
    #historyScreen {
      justify-content: flex-start; overflow: hidden;
    }
    .history-content {
      display: flex; flex-direction: column; width: 100%;
      flex: 1; overflow: hidden;
      padding-top: var(--top-nav-h);
      padding-bottom: var(--bot-nav-h);
    }
    .history-header {
      width: 100%; padding: 14px 22px;
      display: flex; align-items: center; gap: 10px;
      flex-shrink: 0; border-bottom: 1px solid var(--rim);
    }
    .history-title { font-size: 20px; font-weight: 600; }
    .history-cat-label {
      font-size: 11px; padding: 3px 10px; border-radius: 99px;
      border: 1px solid var(--accent); color: var(--accent); letter-spacing: 1px;
      text-transform: uppercase;
    }
    .history-scroll {
      flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none;
    }
    .history-scroll::-webkit-scrollbar { display: none; }
    .history-body { width: 100%; padding: 14px 18px 40px; display: flex; flex-direction: column; gap: 10px; }

    /* Accordion */
    .month-accordion { border: 1px solid var(--rim2); border-radius: var(--r); overflow: hidden; }
    .month-acc-header {
      background: var(--surface); padding: 16px 18px;
      display: flex; align-items: center; justify-content: space-between;
      cursor: pointer; user-select: none;
    }
    .month-acc-header:active { background: var(--surface2); }
    .month-acc-left { display: flex; flex-direction: column; gap: 3px; }
    .month-acc-name { font-size: 14px; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 8px; }
    .month-acc-sub { font-size: 10px; color: var(--muted); letter-spacing: 1px; }
    .month-acc-right { display: flex; align-items: center; gap: 12px; }
    .month-acc-total { font-family: var(--mono); font-size: 20px; color: var(--text); }
    .acc-arrow { font-size: 11px; color: var(--muted); transition: transform .22s; }
    .month-accordion.open .acc-arrow { transform: rotate(180deg); }
    .month-acc-body { display: none; }
    .month-accordion.open .month-acc-body { display: block; }

    .split-summary {
      padding: 14px 18px; border-top: 1px solid var(--rim);
      border-bottom: 1px solid var(--rim);
      background: var(--surface2); display: flex; flex-direction: column; gap: 10px;
    }
    .split-row { display: flex; justify-content: space-between; align-items: center; }
    .split-name { font-size: 12px; color: var(--sub); display: flex; align-items: center; gap: 6px; }
    .split-amt  { font-family: var(--mono); font-size: 14px; color: var(--text); }
    .split-divider { height: 1px; background: var(--rim); }
    .split-each {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 14px; border-radius: 10px;
      background: rgba(61,220,132,.07); border: 1px solid rgba(61,220,132,.2);
    }
    .split-each-label { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--add); }
    .split-each-amt   { font-family: var(--mono); font-size: 20px; color: var(--add); }

    .acc-entries { padding: 8px 12px 12px; display: flex; flex-direction: column; gap: 6px; background: var(--bg); }
    .acc-entry {
      padding: 10px 12px; border-radius: var(--r-sm);
      background: var(--surface);
      display: flex; justify-content: space-between; align-items: center;
    }
    .ae-left { display: flex; flex-direction: column; gap: 3px; }
    .ae-who  { font-size: 10px; color: var(--muted); display: flex; align-items: center; gap: 5px; }
    .ae-desc { font-size: 13px; color: var(--text); }
    .ae-meta { font-size: 10px; color: var(--muted); }
    .ae-amt  { font-family: var(--mono); font-size: 15px; }
    .ae-amt.pos { color: var(--add); }
    .ae-amt.neg { color: var(--red); }

    .empty-state { text-align: center; padding: 50px 0; color: var(--muted); font-size: 13px; line-height: 2; }
    .empty-icon  { font-size: 38px; margin-bottom: 10px; }

    /* ── TOAST ── */
    #toast {
      position: fixed; bottom: calc(var(--bot-nav-h) + 14px); left: 50%;
      transform: translateX(-50%) translateY(14px);
      background: var(--text); color: #000;
      border-radius: 99px; padding: 9px 20px; font-size: 13px; font-weight: 600;
      opacity: 0; transition: opacity .22s, transform .22s;
      pointer-events: none; white-space: nowrap; z-index: 999;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── LOADING ── */
    #loadingScreen { z-index: 200; background: #000; }
    .loader-ring {
      width: 40px; height: 40px; border: 2px solid var(--rim2);
      border-top-color: var(--text); border-radius: 50%; animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── OFFLINE ── */
    #offlineBanner {
      position: fixed; top: 0; left: 0; right: 0;
      background: var(--red); color: #fff; text-align: center;
      font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
      padding: 7px; z-index: 300; transform: translateY(-100%); transition: transform .3s;
    }
    #offlineBanner.show { transform: translateY(0); }

    /* current tab pill */
    .current-pill {
      font-size: 9px; padding: 2px 8px; border-radius: 99px;
      border: 1px solid var(--accent); color: var(--accent); letter-spacing: 1px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

<div id="offlineBanner">⚠ Offline</div>

<!-- LOADING -->
<div class="screen" id="loadingScreen">
  <div class="loader-ring"></div>
</div>

<!-- LOGIN -->
<div class="screen hidden" id="loginScreen">
  <div class="login-logo">
    <div class="logo-mark">÷2</div>
    <h1>Splits</h1>
  </div>
  <div class="name-input-wrap">
    <label>Who are you?</label>
    <input id="nameInput" type="text" placeholder="Your name" autocomplete="off" spellcheck="false" />
    <button class="btn-primary" id="loginBtn">Continue →</button>
  </div>
  <p class="login-hint">Your name is saved on this device.<br>Both of you use the same app.</p>
</div>

<!-- TOP NAV (shared across home/history) -->
<nav class="top-nav hidden" id="topNav">
  <button class="top-nav-item active" data-cat="all" id="tnAll">
    <span class="top-nav-icon">◈</span>
    <span class="top-nav-label">All</span>
  </button>
  <button class="top-nav-item" data-cat="🏠 Home" id="tnHome">
    <span class="top-nav-icon">🏠</span>
    <span class="top-nav-label">Home</span>
  </button>
  <button class="top-nav-item" data-cat="🍔 Food" id="tnFood">
    <span class="top-nav-icon">🍔</span>
    <span class="top-nav-label">Food</span>
  </button>
  <button class="top-nav-add" id="topAddBtn">+</button>
</nav>

<!-- HOME -->
<div class="screen hidden" id="homeScreen">
  <div class="home-content">
    <div class="home-header">
      <div class="header-left">
        <span class="greeting">Hey,</span>
        <span class="username-display" id="headerName">—</span>
      </div>
      <button class="icon-btn" id="logoutBtn" title="Switch user">↩</button>
    </div>

    <div class="month-card">
      <div class="month-label" id="monthLabel">—</div>
      <div class="month-total"><span class="currency">₹</span><span id="totalAmount">0</span></div>
      <div class="month-divider"></div>
      <div class="member-totals">
        <div class="member-total">
          <div class="member-name"><span class="dot dot-me"></span><span id="m1name">—</span></div>
          <div class="member-amount">₹<span id="m1amount">0</span></div>
        </div>
        <div class="member-total">
          <div class="member-name"><span class="dot dot-them"></span><span id="m2name">—</span></div>
          <div class="member-amount">₹<span id="m2amount">0</span></div>
        </div>
      </div>
    </div>

    <!-- Swipe zone -->
    <div class="swipe-zone" id="swipeZone">
      <div class="swipe-hint-up">
        <div class="hint-arrow">↑</div>
        <div class="hint-label">swipe up · add</div>
      </div>
      <div class="swipe-center">
        <div class="swipe-ring" id="swipeRing">₹</div>
        <div class="swipe-sub">your expenses</div>
      </div>
      <div class="swipe-hint-down">
        <div class="hint-label">swipe down · remove</div>
        <div class="hint-arrow">↓</div>
      </div>
    </div>

    <!-- Entries list -->
    <div class="entries-scroll" id="homeEntries"></div>

    <div class="live-bar">
      <div class="live-dot"></div>
      live · firebase
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <div class="bottom-nav">
    <button class="nav-item active" id="navHome">
      <span class="nav-icon">◈</span>
      <span class="nav-label">Home</span>
    </button>
    <button class="nav-item" id="navHistory">
      <span class="nav-icon">≡</span>
      <span class="nav-label">History</span>
    </button>
  </div>
</div>

<!-- EXPENSE MODAL -->
<div class="modal-overlay hidden" id="modal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">Amount to <span class="mode-badge add" id="modeBadge">add</span></div>
    <div class="modal-cats" id="modalCats"></div>
    <div class="amount-row">
      <span class="amount-symbol">₹</span>
      <input id="amountInput" type="number" inputmode="decimal" placeholder="0" min="0" />
    </div>
    <input id="descInput" type="text" placeholder="Description (optional)" maxlength="80" />
    <div class="modal-date" id="modalDate">—</div>
    <div class="modal-actions">
      <button class="btn-cancel" id="cancelBtn">Cancel</button>
      <button class="btn-confirm add" id="confirmBtn">Add</button>
    </div>
  </div>
</div>

<!-- ADD CATEGORY MODAL -->
<div class="modal-overlay hidden" id="addCatModal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">New Category</div>
    <div class="cat-modal-inputs">
      <input id="catEmojiInput" type="text" maxlength="2" placeholder="🛒" />
      <input id="catNameInput" type="text" placeholder="Category name" maxlength="20" />
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" id="cancelCatBtn">Cancel</button>
      <button class="btn-confirm add" id="confirmCatBtn">Add</button>
    </div>
  </div>
</div>

<!-- HISTORY -->
<div class="screen hidden" id="historyScreen">
  <div class="history-content">
    <div class="history-header">
      <span class="history-title">History</span>
      <span class="history-cat-label" id="historyCatLabel">All</span>
    </div>
    <div class="history-scroll">
      <div class="history-body" id="historyBody"></div>
    </div>
  </div>

  <!-- BOTTOM NAV (duplicate for history screen) -->
  <div class="bottom-nav">
    <button class="nav-item" id="navHome2">
      <span class="nav-icon">◈</span>
      <span class="nav-label">Home</span>
    </button>
    <button class="nav-item active" id="navHistory2">
      <span class="nav-icon">≡</span>
      <span class="nav-label">History</span>
    </button>
  </div>
</div>

<div id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import {
    getFirestore, collection, addDoc, onSnapshot,
    query, orderBy, where, Timestamp
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBiwJJHmiJ4-3MAlKWydGxVO6sc2P8EB3o",
    authDomain: "home-expense-ebb69.firebaseapp.com",
    projectId: "home-expense-ebb69",
    storageBucket: "home-expense-ebb69.firebasestorage.app",
    messagingSenderId: "803242375409",
    appId: "1:803242375409:web:2ae0f97355ccfa0e81d150",
    measurementId: "G-2PN5SG02K2"
  };

  const fbApp = initializeApp(firebaseConfig);
  const db    = getFirestore(fbApp);
  const COL   = "expenses";

  // ── STATE ──
  let currentUser      = localStorage.getItem("splits_user") || null;
  let modalMode        = "add";
  let activeCat        = "all";   // "all" | "🏠 Home" | "🍔 Food" | custom
  let activeView       = "home";  // "home" | "history"
  let selectedModalCat = "";
  let unsubHome        = null;
  let unsubHist        = null;
  let allDocs          = [];

  const DEFAULT_CATS = ["🏠 Home", "🍔 Food"];
  let customCats = JSON.parse(localStorage.getItem("splits_cats") || "[]");
  const allCats  = () => [...DEFAULT_CATS, ...customCats];

  const MONTHS = ["January","February","March","April","May","June",
                  "July","August","September","October","November","December"];

  const $ = id => document.getElementById(id);
  const screens = {
    loading: $("loadingScreen"), login: $("loginScreen"),
    home:    $("homeScreen"),    history: $("historyScreen")
  };

  function show(name) {
    Object.values(screens).forEach(s => s.classList.add("hidden"));
    screens[name].classList.remove("hidden");
    // Show top nav only on home/history
    if (name === "home" || name === "history") {
      $("topNav").classList.remove("hidden");
    } else {
      $("topNav").classList.add("hidden");
    }
  }

  let toastT;
  function toast(msg) {
    const el = $("toast"); el.textContent = msg; el.classList.add("show");
    clearTimeout(toastT); toastT = setTimeout(() => el.classList.remove("show"), 2200);
  }

  function nowKey() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
  }
  function monthName(key) { const [y,m] = key.split("-"); return `${MONTHS[+m-1]} ${y}`; }
  function todayLabel()   {
    const d = new Date();
    return `${d.getDate()} ${MONTHS[d.getMonth()]} ${d.getFullYear()}`;
  }
  function fmt(n) { return Math.abs(n).toLocaleString("en-IN"); }

  window.addEventListener("offline", () => $("offlineBanner").classList.add("show"));
  window.addEventListener("online",  () => $("offlineBanner").classList.remove("show"));

  // ── INIT ──
  show("loading");
  setTimeout(() => { currentUser ? startHome() : show("login"); }, 600);

  // ── LOGIN ──
  $("nameInput").addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });
  $("loginBtn").addEventListener("click", doLogin);
  function doLogin() {
    const name = $("nameInput").value.trim();
    if (!name) { toast("Enter your name"); return; }
    currentUser = name;
    localStorage.setItem("splits_user", name);
    startHome();
  }
  $("logoutBtn").addEventListener("click", () => {
    if (unsubHome) unsubHome();
    if (unsubHist) unsubHist();
    currentUser = null;
    localStorage.removeItem("splits_user");
    $("nameInput").value = "";
    show("login");
  });

  // ── TOP NAV ──
  function setActiveCat(cat) {
    activeCat = cat;
    // Update top nav highlights
    document.querySelectorAll(".top-nav-item").forEach(btn => {
      btn.classList.toggle("active", btn.dataset.cat === cat);
    });
    // Update history label
    $("historyCatLabel").textContent = cat === "all" ? "All" : cat;
    // Refresh current view
    if (activeView === "home") {
      renderHomeTotal();
      renderHomeEntries();
    } else {
      renderHistoryFromDocs();
    }
  }

  document.querySelectorAll(".top-nav-item").forEach(btn => {
    btn.addEventListener("click", () => setActiveCat(btn.dataset.cat));
  });

  $("topAddBtn").addEventListener("click", () => openAddCat());

  // ── HOME ──
  function startHome() {
    activeView = "home";
    show("home");
    $("headerName").textContent = currentUser;
    $("navHome").classList.add("active");
    $("navHistory").classList.remove("active");
    subscribeMonth();
    setActiveCat(activeCat); // refresh top nav state
  }

  function subscribeMonth() {
    if (unsubHome) unsubHome();
    const key = nowKey();
    const [y, m] = key.split("-").map(Number);
    const start = new Date(y, m-1, 1), end = new Date(y, m, 1);
    $("monthLabel").textContent = monthName(key);

    const q = query(
      collection(db, COL),
      where("ts", ">=", Timestamp.fromDate(start)),
      where("ts", "<",  Timestamp.fromDate(end)),
      orderBy("ts", "desc")
    );
    unsubHome = onSnapshot(q, snap => {
      allDocs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      renderHomeTotal();
      renderHomeEntries();
    }, err => { console.error(err); toast("Firebase error"); });
  }

  function getFilteredDocs() {
    return activeCat === "all" ? allDocs : allDocs.filter(d => d.category === activeCat);
  }

  function renderHomeTotal() {
    const docs = getFilteredDocs();
    const totals = {};
    docs.forEach(d => { totals[d.user] = (totals[d.user]||0) + d.amount; });
    const grand = Object.values(totals).reduce((a,b)=>a+b, 0);
    $("totalAmount").textContent = fmt(grand);
    const order = [currentUser, ...Object.keys(totals).filter(u => u !== currentUser)];
    const [u1, u2] = order;
    $("m1name").textContent   = u1 || "—";
    $("m1amount").textContent = fmt(totals[u1]||0);
    $("m2name").textContent   = u2 || "Waiting...";
    $("m2amount").textContent = fmt(totals[u2]||0);
  }

  function renderHomeEntries() {
    const filtered = getFilteredDocs();
    const wrap = $("homeEntries");
    if (!filtered.length) {
      wrap.innerHTML = `<div class="empty-home">No entries here yet.<br>Tap + to add one.</div>`;
      return;
    }
    wrap.innerHTML = filtered.map(e => {
      const ts  = e.ts.toDate();
      const day = `${ts.getDate()} ${MONTHS[ts.getMonth()]}`;
      const pos = e.amount >= 0;
      return `
        <div class="home-entry">
          <div class="he-left">
            <div class="he-who">
              <span class="dot ${e.user===currentUser?'dot-me':'dot-them'}"></span>
              ${e.user}
              <span class="cat-pill">${e.category||"Other"}</span>
            </div>
            ${e.desc ? `<div class="he-desc">${e.desc}</div>` : ""}
            <div class="he-meta">${day}</div>
          </div>
          <div class="he-amt ${pos?'pos':'neg'}">${pos?'+':'-'}₹${fmt(e.amount)}</div>
        </div>`;
    }).join("");
  }

  // ── SWIPE ──
  const zone = $("swipeZone");
  let startY=0, startX=0, dragging=false;
  const THRESH = 58;

  zone.addEventListener("touchstart", e => {
    startY = e.touches[0].clientY; startX = e.touches[0].clientX; dragging = true;
  }, { passive: true });

  zone.addEventListener("touchmove", e => {
    if (!dragging) return;
    const dy = startY - e.touches[0].clientY;
    const dx = Math.abs(e.touches[0].clientX - startX);
    if (dx > Math.abs(dy)) { dragging = false; return; }
    zone.classList.toggle("dragging-up",   dy > 20);
    zone.classList.toggle("dragging-down", dy < -20);
    if (dy > 20)       $("swipeRing").textContent = "+";
    else if (dy < -20) $("swipeRing").textContent = "−";
    else               $("swipeRing").textContent = "₹";
  }, { passive: true });

  zone.addEventListener("touchend", e => {
    if (!dragging) return; dragging = false;
    const dy = startY - e.changedTouches[0].clientY;
    const dx = Math.abs(e.changedTouches[0].clientX - startX);
    zone.classList.remove("dragging-up","dragging-down");
    $("swipeRing").textContent = "₹";
    if (dx > Math.abs(dy)) return;
    if      (dy >  THRESH) openModal("add");
    else if (dy < -THRESH) openModal("sub");
  }, { passive: true });

  // mouse fallback
  let mY=0, mDrag=false;
  zone.addEventListener("mousedown", e => { mY = e.clientY; mDrag = true; });
  window.addEventListener("mouseup", e => {
    if (!mDrag) return; mDrag = false;
    const dy = mY - e.clientY;
    if      (dy >  THRESH) openModal("add");
    else if (dy < -THRESH) openModal("sub");
  });

  // ── BOTTOM NAV ──
  $("navHome").addEventListener("click", () => {
    activeView = "home";
    show("home");
    $("navHome").classList.add("active");
    $("navHistory").classList.remove("active");
    renderHomeTotal();
    renderHomeEntries();
  });

  $("navHistory").addEventListener("click", openHistory);

  $("navHome2").addEventListener("click", () => {
    activeView = "home";
    show("home");
    renderHomeTotal();
    renderHomeEntries();
  });

  $("navHistory2").addEventListener("click", openHistory);

  // ── ADD CATEGORY ──
  function openAddCat() { $("addCatModal").classList.remove("hidden"); $("catNameInput").focus(); }
  $("cancelCatBtn").addEventListener("click", () => $("addCatModal").classList.add("hidden"));
  $("addCatModal").addEventListener("click", e => { if(e.target===$("addCatModal")) $("addCatModal").classList.add("hidden"); });
  $("confirmCatBtn").addEventListener("click", () => {
    const emoji = $("catEmojiInput").value.trim() || "📦";
    const name  = $("catNameInput").value.trim();
    if (!name) { toast("Enter a name"); return; }
    const cat = `${emoji} ${name}`;
    if (!customCats.includes(cat) && !DEFAULT_CATS.includes(cat)) {
      customCats.push(cat);
      localStorage.setItem("splits_cats", JSON.stringify(customCats));
    }
    $("addCatModal").classList.add("hidden");
    $("catEmojiInput").value = ""; $("catNameInput").value = "";
    toast(`"${cat}" added`);
  });

  // ── EXPENSE MODAL ──
  function openModal(mode) {
    modalMode = mode;
    const isAdd = mode === "add";
    $("modeBadge").textContent = isAdd ? "add" : "remove";
    $("modeBadge").className   = `mode-badge ${isAdd?"add":"sub"}`;
    $("confirmBtn").textContent = isAdd ? "Add" : "Remove";
    $("confirmBtn").className   = `btn-confirm ${isAdd?"add":"sub"}`;
    $("modalDate").textContent  = `📅  ${todayLabel()}`;
    $("amountInput").value      = "";
    $("descInput").value        = "";
    buildModalCats();
    $("modal").classList.remove("hidden");
    setTimeout(() => $("amountInput").focus(), 120);
  }

  function buildModalCats() {
    const wrap = $("modalCats");
    wrap.innerHTML = "";
    const cats = allCats();
    if (!selectedModalCat || !cats.includes(selectedModalCat)) selectedModalCat = cats[0];
    cats.forEach(c => {
      const btn = document.createElement("button");
      btn.className = "modal-cat-btn" + (c === selectedModalCat ? " selected" : "");
      btn.dataset.cat = c; btn.textContent = c;
      btn.addEventListener("click", () => {
        wrap.querySelectorAll(".modal-cat-btn").forEach(b => b.classList.remove("selected"));
        btn.classList.add("selected");
        selectedModalCat = c;
      });
      wrap.appendChild(btn);
    });
    // Add custom cat button
    const addBtn = document.createElement("button");
    addBtn.className = "modal-cat-btn";
    addBtn.textContent = "＋ Add";
    addBtn.addEventListener("click", () => { closeModal(); openAddCat(); });
    wrap.appendChild(addBtn);
  }

  $("cancelBtn").addEventListener("click", closeModal);
  $("modal").addEventListener("click", e => { if(e.target===$("modal")) closeModal(); });
  function closeModal() { $("modal").classList.add("hidden"); }

  $("confirmBtn").addEventListener("click", async () => {
    const raw = parseFloat($("amountInput").value);
    if (!raw || raw <= 0) { toast("Enter a valid amount"); return; }
    const amount = modalMode === "sub" ? -raw : raw;
    const desc   = $("descInput").value.trim();
    try {
      await addDoc(collection(db, COL), {
        user: currentUser, amount, category: selectedModalCat, desc,
        ts: Timestamp.now()
      });
      closeModal();
      toast(modalMode==="add" ? `+₹${fmt(raw)} added` : `-₹${fmt(raw)} removed`);
    } catch(err) { console.error(err); toast("Failed to save"); }
  });
  $("amountInput").addEventListener("keydown", e => { if(e.key==="Enter") $("confirmBtn").click(); });

  // ── HISTORY ──
  let historyAllDocs = [];

  function openHistory() {
    activeView = "history";
    show("history");
    $("historyCatLabel").textContent = activeCat === "all" ? "All" : activeCat;
    $("historyBody").innerHTML = `<div class="empty-state"><div class="loader-ring" style="margin:0 auto"></div></div>`;
    if (unsubHist) unsubHist();
    const q = query(collection(db, COL), orderBy("ts", "desc"));
    unsubHist = onSnapshot(q, snap => {
      historyAllDocs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      renderHistoryFromDocs();
    });
  }

  function renderHistoryFromDocs() {
    const docs = activeCat === "all"
      ? historyAllDocs
      : historyAllDocs.filter(d => d.category === activeCat);
    renderHistory(docs);
  }

  function renderHistory(docs) {
    if (!docs.length) {
      $("historyBody").innerHTML = `<div class="empty-state"><div class="empty-icon">🧾</div>No expenses yet.</div>`;
      return;
    }
    const groups = {};
    docs.forEach(d => {
      const ts  = d.ts.toDate();
      const key = `${ts.getFullYear()}-${String(ts.getMonth()+1).padStart(2,"0")}`;
      if (!groups[key]) groups[key] = [];
      groups[key].push(d);
    });

    const curKey = nowKey();
    let html = "";
    Object.entries(groups).forEach(([key, entries]) => {
      const totals = {};
      entries.forEach(e => { totals[e.user] = (totals[e.user]||0) + e.amount; });
      const grand   = Object.values(totals).reduce((a,b)=>a+b, 0);
      const perHead = grand / 2;
      const users   = Object.keys(totals);
      const isCur   = key === curKey;

      const membersHTML = users.map((u,i) => `
        <div class="split-row">
          <div class="split-name"><span class="dot ${i===0?'dot-me':'dot-them'}"></span>${u}</div>
          <div class="split-amt">₹${fmt(totals[u])}</div>
        </div>`).join("");

      const entriesHTML = entries.map(e => {
        const ts  = e.ts.toDate();
        const day = `${ts.getDate()} ${MONTHS[ts.getMonth()]}`;
        const pos = e.amount >= 0;
        return `
          <div class="acc-entry">
            <div class="ae-left">
              <div class="ae-who"><span class="dot ${e.user===currentUser?'dot-me':'dot-them'}"></span>${e.user}</div>
              ${e.desc ? `<div class="ae-desc">${e.desc}</div>` : ""}
              <div class="ae-meta">${e.category||"Other"} · ${day}</div>
            </div>
            <div class="ae-amt ${pos?'pos':'neg'}">${pos?'+':'-'}₹${fmt(e.amount)}</div>
          </div>`;
      }).join("");

      html += `
        <div class="month-accordion ${isCur?"open":""}" data-key="${key}">
          <div class="month-acc-header">
            <div class="month-acc-left">
              <div class="month-acc-name">
                ${monthName(key)}
                ${isCur?`<span class="current-pill">current</span>`:""}
              </div>
              <div class="month-acc-sub">${entries.length} transaction${entries.length!==1?"s":""}</div>
            </div>
            <div class="month-acc-right">
              <div class="month-acc-total">₹${fmt(grand)}</div>
              <div class="acc-arrow">▼</div>
            </div>
          </div>
          <div class="month-acc-body">
            <div class="split-summary">
              ${membersHTML}
              <div class="split-divider"></div>
              <div class="split-each">
                <div class="split-each-label">Each pays</div>
                <div class="split-each-amt">₹${fmt(perHead)}</div>
              </div>
            </div>
            <div class="acc-entries">${entriesHTML}</div>
          </div>
        </div>`;
    });

    $("historyBody").innerHTML = html;
    document.querySelectorAll(".month-acc-header").forEach(h => {
      h.addEventListener("click", () => h.parentElement.classList.toggle("open"));
    });
  }
</script>
</body>
</html>
